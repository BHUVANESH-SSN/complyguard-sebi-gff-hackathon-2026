name: regops-ai

services:
  postgres:
    image: postgres:16
    container_name: regops-ai-postgres
    environment:
      POSTGRES_USER: regops
      POSTGRES_PASSWORD: regops
      POSTGRES_DB: regops
    ports:
      # Host port 5433, not 5432: this machine already has an unrelated
      # project's Postgres bound to 5432. Container-internal port stays
      # 5432 (Postgres's own default), only the host-side mapping changes.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regops -d regops"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: regops-ai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
